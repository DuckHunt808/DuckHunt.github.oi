<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lucky Duck</title>
<style>
  body {
    margin: 0;
    padding: 40px;
    font-family: Arial, sans-serif;
    background: #eaf6ff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    text-align: center;
    background: white;
    padding: 28px 22px;
    border-radius: 24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    max-width: 400px;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 12px;
  }

  .subtitle {
    font-size: 1rem;
    color: #555;
    margin-bottom: 22px;
  }

  button {
    font-size: 1.1rem;
    font-weight: bold;
    padding: 14px 20px;
    border: none;
    border-radius: 14px;
    background: #ffd84d;
    color: #222;
    cursor: pointer;
    width: 100%;
    max-width: 260px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  button:hover {
    transform: scale(1.03);
  }

  button:active {
    transform: scale(0.97);
  }

  .pop {
    animation: pop 0.28s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<div class="container">
  <h1>🦆 You found a duck!</h1>
  <p class="subtitle">This tiny duck was hidden to make your day a little better.</p>
  <p class="subtitle">Keep it, or re-hide it. 🙂</p>

  <button id="duckButton">Duck Count</button>
</div>

<!-- Tiny quack sound embedded in base64 -->
<audio id="quackSound">
  <source src="data:audio/wav;base64,UklGRuQAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YcQAAAAA" type="audio/wav">
</audio>

<script>
const button = document.getElementById('duckButton');
const quack = document.getElementById('quackSound');

button.addEventListener('click', () => {
  // Play quack sound
  quack.currentTime = 0;
  quack.play();

  // Pop animation
  button.classList.remove('pop'); // reset animation
  void button.offsetWidth;        // trigger reflow
  button.classList.add('pop');

  // Change text
  button.textContent = "Duck counted!";
});
</script>

</body>
</html>
