<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Duck</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #eaf6ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 24px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .duck {
      width: 130px;
      max-width: 50%;
      height: auto;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 1.8rem;
      margin: 0 0 8px 0;
      color: #222;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 1rem;
      color: #555;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .label {
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
      margin-top: 8px;
    }

    .count {
      font-size: 4.2rem;
      font-weight: bold;
      line-height: 1;
      margin: 12px 0 22px 0;
      color: #111;
      transition: transform 0.18s ease;
    }

    .count.bump {
      transform: scale(1.12);
    }

    button {
      font-size: 1.1rem;
      font-weight: bold;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      background: #ffd84d;
      color: #222;
      cursor: pointer;
      width: 100%;
      max-width: 260px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover {
      transform: scale(1.03);
    }

    button:active {
      transform: scale(0.97);
    }

    button.pop {
      animation: pop 0.28s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    button:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .footer {
      font-size: 1rem;
      color: #444;
      line-height: 1.5;
      margin-top: 18px;
    }

    .tiny {
      font-size: 0.85rem;
      color: #777;
      margin-top: 12px;
    }

    @media (max-width: 480px) {
      .count {
        font-size: 3.5rem;
      }

      h1 {
        font-size: 1.55rem;
      }

      .container {
        padding: 24px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="duck" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-label="Cartoon duck" role="img">
      <ellipse cx="95" cy="115" rx="55" ry="42" fill="#FFD84D"/>
      <circle cx="132" cy="78" r="32" fill="#FFD84D"/>
      <ellipse cx="156" cy="87" rx="20" ry="12" fill="#FF9F43"/>
      <circle cx="142" cy="72" r="4.5" fill="#222"/>
      <path d="M114 52 Q126 28 146 45" fill="#FFD84D"/>
      <ellipse cx="72" cy="150" rx="8" ry="16" fill="#FF9F43" transform="rotate(12 72 150)"/>
      <ellipse cx="104" cy="152" rx="8" ry="16" fill="#FF9F43" transform="rotate(-8 104 152)"/>
      <path d="M48 107 Q30 96 42 78 Q52 82 60 96" fill="#FFE680"/>
    </svg>

    <h1>🦆 You found a duck!</h1>
    <div class="subtitle">This tiny duck was hidden to make your day a little better.</div>

    <div class="label">Ducks discovered</div>
    <div class="count" id="count">...</div>

    <button id="duckButton">I found a duck</button>

    <div class="footer">Keep it, or re-hide it. 🙂</div>
    <div class="tiny" id="status"></div>
  </div>

  <script>
    const namespace = "tiny-duckhunt808-counter-67";
    const key = "ducks-discovered";
    const countEl = document.getElementById("count");
    const button = document.getElementById("duckButton");
    const statusEl = document.getElementById("status");

    function getStorageKey() {
      return "duck-clicked-" + namespace + "-" + key;
    }

    function bumpCount() {
      countEl.classList.add("bump");
      setTimeout(() => countEl.classList.remove("bump"), 180);
    }

    function popButton() {
      button.classList.remove("pop");
      void button.offsetWidth;
      button.classList.add("pop");
    }

    async function loadCount() {
      try {
        const response = await fetch(`https://countapi.mileshilliard.com/api/v1/${namespace}/${key}`);
        const data = await response.json();
        countEl.textContent = data.value ?? 0;
      } catch {
        countEl.textContent = "?";
        statusEl.textContent = "Counter could not load.";
      }
    }

    async function incrementCount() {
      try {
        button.disabled = true;
        popButton();

        const response = await fetch(`https://countapi.mileshilliard.com/api/v1/${namespace}/${key}/up`);
        const data = await response.json();

        countEl.textContent = data.value;
        bumpCount();

        localStorage.setItem(getStorageKey(), "yes");
        button.textContent = "Duck counted!";
        statusEl.textContent = "This device already counted this duck.";
      } catch {
        button.disabled = false;
        statusEl.textContent = "Could not update counter.";
      }
    }

    loadCount().then(() => {
      if (localStorage.getItem(getStorageKey()) === "yes") {
        button.disabled = true;
        button.textContent = "Duck counted!";
        statusEl.textContent = "This device already counted this duck.";
      }
    });

    button.addEventListener("click", incrementCount);
  </script>
</body>
</html>
