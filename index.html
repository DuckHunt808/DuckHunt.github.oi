<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lucky Duck</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fdf6e3;
      text-align: center;
      padding: 40px;
    }
    .box {
      max-width: 520px;
      margin: auto;
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }
    h1 { margin-top: 0; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🦆 You found a duck!</h1>
<p>This tiny duck was hidden to make your day a little better.</p>
<p>Keep it, or re-hide it. 🙂</p>
  </div>
</body>
</html>
