<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lucky Duck</title>
<style>
  body {
    margin: 0;
    padding: 40px;
    font-family: Arial, sans-serif;
    background: #eaf6ff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    text-align: center;
    background: white;
    padding: 28px 22px;
    border-radius: 24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    max-width: 400px;
  }

  h1 {
    font-size: 1.8rem;
    margin: 12px 0;
  }

  .subtitle {
    font-size: 1rem;
    color: #555;
    margin-bottom: 22px;
  }

  button {
    font-size: 1.1rem;
    font-weight: bold;
    padding: 14px 20px;
    border: none;
    border-radius: 14px;
    background: #ffd84d;
    color: #222;
    cursor: pointer;
    width: 100%;
    max-width: 260px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  button:hover {
    transform: scale(1.03);
  }

  button:active {
    transform: scale(0.97);
  }

  .pop {
    animation: pop 0.28s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  /* Duck SVG size */
  #duckSVG {
    width: 120px;
    height: 120px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Cartoon duck SVG on top -->
  <svg id="duckSVG" viewBox="0 0 200 200">
    <!-- Body -->
    <ellipse cx="95" cy="115" rx="55" ry="42" fill="#FFD84D"/>
    <!-- Head -->
    <circle cx="132" cy="78" r="32" fill="#FFD84D"/>
    <!-- Beak -->
    <ellipse cx="156" cy="87" rx="20" ry="12" fill="#FF9F43"/>
    <!-- Eye -->
    <circle cx="142" cy="72" r="4.5" fill="#222"/>
    <!-- Wings -->
    <ellipse cx="72" cy="150" rx="8" ry="16" fill="#FF9F43" transform="rotate(12 72 150)"/>
    <ellipse cx="104" cy="152" rx="8" ry="16" fill="#FF9F43" transform="rotate(-8 104 152)"/>
    <!-- Tail -->
    <path d="M48 107 Q30 96 42 78 Q52 82 60 96" fill="#FFE680"/>
  </svg>

  <h1>🦆 You found a duck!</h1>
  <p class="subtitle">This tiny duck was hidden to make your day a little better.</p>
  <p class="subtitle">Keep it, or re-hide it. 🙂</p>

  <button id="duckButton">Count Duck</button>
</div>

<!-- Quack sound -->
<audio id="quackSound" src="quack.mp3"></audio>

<script>
const button = document.getElementById('duckButton');
const quack = document.getElementById('quackSound');

button.addEventListener('click', () => {
  // Play quack sound
  quack.currentTime = 0;
  quack.play();

  // Pop animation
  button.classList.remove('pop'); // reset
  void button.offsetWidth;        // trigger reflow
  button.classList.add('pop');

  // Change text
  button.textContent = "Duck counted!";
});
</script>

</body>
</html>
