<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lucky Duck</title>
<style>
  body { margin:0; padding:16px; font-family:Arial,sans-serif; background:#eaf6ff; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .container { width:100%; max-width:430px; background:white; border-radius:24px; padding:28px 22px; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,0.15); }
  .count { font-size:4.2rem; font-weight:bold; margin:12px 0 22px 0; color:#111; }
  button { font-size:1.1rem; padding:14px 20px; border:none; border-radius:14px; background:#ffd84d; cursor:pointer; width:100%; max-width:260px; }
</style>
</head>
<body>
<div class="container">
  <h1>🦆 You found a duck!</h1>
  <div>Ducks discovered</div>
  <div class="count" id="count">...</div>
  <button id="duckButton">I found a duck</button>
</div>

<script>
const namespace = "lucky_duck_site1";
const key = "ducks_found";
const countEl = document.getElementById("count");
const button = document.getElementById("duckButton");

// Load current counter
fetch(`https://api.countapi.xyz/get/${namespace}/${key}`)
  .then(res => res.json())
  .then(data => {
    countEl.textContent = data.value ?? 0;
  })
  .catch(() => { countEl.textContent = "?"; });

// Increase counter on click
button.addEventListener("click", () => {
  button.disabled = true;
  fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`)
    .then(res => res.json())
    .then(data => {
      countEl.textContent = data.value;
    })
    .catch(() => {
      countEl.textContent = "?";
    });
});
</script>

</body>
</html>
